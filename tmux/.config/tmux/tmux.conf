set-option -g prefix C-Space
unbind-key C-b
bind-key C-Space send-prefix

set-window-option -g mode-keys vi

set -g status-style fg=white,bg=black

set-window -g window-status-current-format '#[fg=green]#I#[fg=white]'
set-window -g window-status-format '#I'

set -g status-right '#{user}#[fg=red]@#[fg=white]#{host} #[fg=yellow]%Y-%m-%d %R#[fg=white]'

set-option -g focus-event on
set-option -sg escape-time 10
set-option -sa terminal-features ',alacritty:RGB'

unbind-key e
bind-key -r e new-window 'vim ~/.config/tmux/tmux.conf'

unbind-key r
bind-key -r r source-file ~/.config/tmux/tmux.conf \; \
  display-message 'reload ~/.config/tmux/tmux.conf'

unbind-key '"'
bind-key | split-window -h -c '#{pane_current_path}'

unbind-key '%'
bind-key - split-window -v -c '#{pane_current_path}'

bind-key -r < swap-window -t -
bind-key -r > swap-window -t +

bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

bind-key -r H resize-pane -L 12
bind-key -r J resize-pane -D 12
bind-key -r K resize-pane -U 12
bind-key -r L resize-pane -R 12
