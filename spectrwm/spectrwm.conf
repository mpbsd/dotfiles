# PLEASE READ THE MAN PAGE BEFORE EDITING THIS FILE!
# https://htmlpreview.github.io/?https://github.com/conformal/spectrwm/blob/master/spectrwm.html
# NOTE: all rgb color values in this file are in hex! see XQueryColor for
# examples

workspace_limit  = 9
focus_mode       = default
focus_close      = previous
focus_close_wrap = 1
focus_default    = last
spawn_position   = next
workspace_clamp  = 1
warp_focus       = 1
warp_pointer     = 1

# Window Decoration
border_width            = 2
color_focus             = rgb:00/80/80
color_focus_maximized   = rgb:80/80/00
color_unfocus           = rgb:80/60/80
color_unfocus_maximized = rgb:60/80/60
region_padding          = 8
tile_gap                = 8

# Region containment
# Distance window must be dragged/resized beyond the region edge before it is
# allowed outside the region.
boundary_width = 50

# Remove window border when bar is disabled and there is only one window in
# workspace
disable_border = 0

# Bar Settings
bar_enabled             = 1
bar_enabled_ws[1]       = 0
bar_border_width        = 1
bar_border[1]           = rgb:00/00/00
bar_border_unfocus[1]   = rgb:00/00/00
bar_color[1]            = rgb:00/00/00
bar_color_selected[1]   = rgb:00/00/00
bar_font_color[1]       = rgb:00/80/80
bar_font_color_selected = rgb:80/80/00
bar_font                = xos4 Terminus:pixelsize=18:antialias=true:style=Bold
bar_font_pua            = Typicons:pixelsize=14:antialias=true
bar_action              = /home/marcelo/bin/baraction.sh
bar_action_expand       = 0
bar_justify             = center
bar_format              = +N:+I +S <+D>+4<%a %b %d %R %Z %Y+8<+A+4<+V
workspace_indicator     = listcurrent,listactive,markcurrent,printnames
bar_at_bottom           = 0
stack_enabled           = 1
clock_enabled           = 1
clock_format            = %a %b %d %R %Z %Y
iconic_enabled          = 0
maximize_hide_bar       = 1
window_class_enabled    = 0
window_instance_enabled = 0
window_name_enabled     = 0
verbose_layout          = 1
urgent_enabled          = 1
urgent_collapse         = 0

# Dialog box size ratio when using TRANSSZ quirk; 0.3 < dialog_ratio <= 1.0
dialog_ratio = 0.6

# Split a non-RandR dual head setup into one region per monitor
# (non-standard driver-based multihead is not seen by spectrwm)
# region = screen[1]:1280x1024+0+0
# region = screen[1]:1280x1024+1280+0

# Launch applications in a workspace of choice
autorun = ws[1]:urxvt
autorun = ws[1]:firefox https://archlinux.org

# Customize workspace layout at start
# layout = ws[1]:4:0:0:0:vertical
# layout = ws[2]:0:0:0:0:horizontal
# layout = ws[3]:0:0:0:0:fullscreen
# layout = ws[4]:4:0:0:0:vertical_flip
# layout = ws[5]:0:0:0:0:horizontal_flip

# Set workspace name at start
# name = ws[1]:IRC
# name = ws[2]:Email
# name = ws[3]:Browse
# name = ws[4]:Music

# Mod key, (Windows key is Mod4) (Apple key on OSX is Mod2)
modkey = Mod4

# This allows you to include pre-defined key bindings for your keyboard layout.
keyboard_mapping = ~/.config/spectrwm/spectrwm_us.conf

# PROGRAMS

# Validated default programs:
program[lock]           = xlock
program[term]           = urxvt
program[menu]           = dmenu_run $dmenu_bottom \
                            -fn $bar_font \
                            -nb $bar_color \
                            -nf $bar_font_color \
                            -sb $bar_color_selected \
                            -sf $bar_font_color_selected
program[search]         = dmenu $dmenu_bottom -i \
                            -fn $bar_font \
                            -nb $bar_color \
                            -nf $bar_font_color \
                            -sb $bar_color_selected \
                            -sf $bar_font_color_selected
program[name_workspace] = dmenu $dmenu_bottom \
                            -p Workspace \
                            -fn $bar_font \
                            -nb $bar_color \
                            -nf $bar_font_color \
                            -sb $bar_color_selected \
                            -sf $bar_font_color_selected

# To disable validation of the above, free the respective binding(s):
# bind[] = MOD+Shift+Delete # disable lock
# bind[] = MOD+Shift+Return # disable term
# bind[] = MOD+p            # disable menu

# Optional default programs that will only be validated if you override:
# program[screenshot_all]  = /home/marcelo/bin/screenshot.sh full
# bind[screenshot_all]     = Mod1+s
# program[screenshot_wind] = /home/marcelo/bin/screenshot.sh window
# bind[screenshot_all]     = Mod1+w
# program[initscr]         = initscreen.sh

# EXAMPLE: Define 'firefox' action and bind to key.
program[alsamixer]   = urxvt -e 'alsamixer'
bind[alsamixer]      = Mod1+a

program[bc]          = urxvt -e 'bc'
bind[bc]             = Mod1+b

program[ncdu]        = urxvt -e 'ncdu'
bind[ncdu]           = Mod1+c

program[ed]          = urxvt -e 'ed'
bind[ed]             = Mod1+e

program[firefox]     = firefox https://archlinux.org
bind[firefox]        = Mod1+f

program[gvim]        = gvim
bind[gvim]           = Mod1+g

program[htop]        = urxvt -e 'htop'
bind[htop]           = Mod1+h

program[irssi]       = urxvt -e 'irssi'
bind[irssi]          = Mod1+i

program[mutt]        = urxvt -e 'mutt'
bind[mutt]           = Mod1+m

program[newsboat]    = urxvt -e 'newsboat'
bind[newsboat]       = Mod1+n

program[python]      = urxvt -e 'python'
bind[python]         = Mod1+p

program[ranger]      = urxvt -e 'ranger'
bind[ranger]         = Mod1+r

program[thunderbird] = thunderbird
bind[thunderbird]    = Mod1+t

program[urxvt]       = urxvt
bind[urxvt]          = Mod1+u

program[vi]          = urxvt -e 'vi'
bind[vi]             = Mod1+v

program[xboard]      = xboard
bind[xboard]         = Mod1+x

# QUIRKS
# Default quirks, remove with: quirk[class:name] = NONE
# quirk[MPlayer:xv]                        = FLOAT + FULLSCREEN + FOCUSPREV
# quirk[OpenOffice.org 2.4:VCLSalFrame]    = FLOAT
# quirk[OpenOffice.org 3.0:VCLSalFrame]    = FLOAT
# quirk[OpenOffice.org 3.1:VCLSalFrame]    = FLOAT
# quirk[Firefox-bin:firefox-bin]           = TRANSSZ
# quirk[Firefox:Dialog]                    = FLOAT
# quirk[Gimp:gimp]                         = FLOAT + ANYWHERE
# quirk[XTerm:xterm]                       = XTERM_FONTADJ
# quirk[xine:Xine Window]                  = FLOAT + ANYWHERE
# quirk[Xitk:Xitk Combo]                   = FLOAT + ANYWHERE
# quirk[xine:xine Panel]                   = FLOAT + ANYWHERE
# quirk[Xitk:Xine Window]                  = FLOAT + ANYWHERE
# quirk[xine:xine Video Fullscreen Window] = FULLSCREEN + FLOAT
# quirk[pcb:pcb]                           = FLOAT
